<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MEP Design Platform</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #0c0c10;
      --surface2: #121218;
      --surface3: #1a1a24;
      --border: rgba(255,120,40,0.2);
      --accent: #ff7828;
      --accent2: #ffaa55;
      --accent3: #ff5500;
      --text: #eef0ff;
      --text-dim: #8890aa;
      --text-muted: #44475a;
      --ict: #38b6ff;
      --security: #ff4466;
      --pava: #a855f7;
      --electrical: #f59e0b;
      --mechanical: #10b981;
      --hvac: #0ea5e9;
      --firefighting: #ef4444;
      --ict-disc: #38b6ff;
      --success: #00e5a0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Exo 2', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,120,40,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,120,40,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,80,0,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    #appRoot {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 2rem 1.5rem; min-height: 100vh;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── HOME HEADER ── */
    .home-header {
      text-align: center;
      padding: 3rem 0 2rem;
      animation: fadeUp 0.6s ease both;
    }
    .home-logo {
      display: inline-flex; align-items: center;
      gap: 16px; margin-bottom: 1.5rem;
    }
    .logo-hexagon { width: 64px; height: 64px; position: relative; display: flex; align-items: center; justify-content: center; }
    .logo-hexagon svg { width: 64px; height: 64px; }
    .home-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3.2rem; font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #ff7828 0%, #ffaa55 50%, #ff5500 100%);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; line-height: 1; text-transform: uppercase;
    }
    .home-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem; letter-spacing: 0.25em;
      color: var(--text-dim); text-transform: uppercase; margin-top: 0.5rem;
    }
    .home-divider {
      display: flex; align-items: center; gap: 16px;
      margin: 2rem auto; max-width: 400px;
    }
    .home-divider::before, .home-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .home-divider span {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; color: var(--accent); letter-spacing: 0.2em;
    }

    /* ── CATEGORY / DISCIPLINE GRID ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem; margin: 1rem 0 3rem;
    }
    .category-card {
      background: var(--surface2); border-radius: 20px;
      padding: 2.5rem 2rem; cursor: pointer;
      border: 1px solid var(--border);
      position: relative; overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, box-shadow 0.3s;
      animation: fadeUp 0.5s ease both;
    }
    .category-card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transition: left 0.5s;
    }
    .category-card:hover::before { left: 100%; }
    .category-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cat-color), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .category-card:hover::after { opacity: 1; }
    .category-card:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--cat-color);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(0,0,0,0.3);
    }
    .cat-corner-glow {
      position: absolute; bottom: -40px; right: -40px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, var(--cat-color), transparent 70%);
      opacity: 0.08; transition: opacity 0.3s;
    }
    .category-card:hover .cat-corner-glow { opacity: 0.15; }
    .cat-tag {
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.2em; color: var(--cat-color);
      text-transform: uppercase; margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 8px;
    }
    .cat-tag::before {
      content: ''; display: inline-block; width: 20px; height: 1px;
      background: var(--cat-color);
    }
    .main-icon-wrap {
      width: 80px; height: 80px; border-radius: 20px;
      background: var(--surface3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem; transition: border-color 0.3s;
    }
    .category-card:hover .main-icon-wrap { border-color: var(--cat-color); }
    .main-icon-wrap i { font-size: 2rem; color: var(--cat-color); }
    .main-icon-wrap svg { width: 40px; height: 40px; }
    .cat-title {
      font-family: 'Rajdhani', sans-serif; font-size: 1.7rem;
      font-weight: 700; letter-spacing: 0.04em;
      color: var(--text); margin-bottom: 0.3rem;
    }
    .cat-desc { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 1.5rem; }
    .sub-icons { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .sub-icon {
      width: 36px; height: 36px; background: var(--surface3);
      border-radius: 10px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--cat-color); font-size: 0.85rem;
      transition: all 0.2s; opacity: 0.6;
    }
    .category-card:hover .sub-icon {
      border-color: var(--cat-color); opacity: 1; background: rgba(0,0,0,0.3);
    }

    /* ── PACKAGE VIEW ── */
    .package-wrap { animation: fadeIn 0.3s ease; }
    .pkg-header {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap;
      gap: 1rem; margin-bottom: 2.5rem;
      padding-bottom: 1.5rem; border-bottom: 1px solid var(--border);
    }
    .pkg-title-row { display: flex; align-items: center; gap: 1rem; }
    .pkg-icon-box {
      width: 52px; height: 52px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    }
    .pkg-name {
      font-family: 'Rajdhani', sans-serif; font-size: 2rem;
      font-weight: 700; letter-spacing: 0.04em;
    }
    .pkg-count {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--text-dim); letter-spacing: 0.1em;
    }
    .back-btn {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 50px;
      font-family: 'Exo 2', sans-serif; font-weight: 600;
      font-size: 0.85rem; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      color: var(--text-dim); transition: all 0.2s;
    }
    .back-btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent2); }

    /* ── TOOL ICON GRID ── */
    .tool-icons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }
    .tool-icon-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem 1.5rem;
      text-align: center; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; overflow: hidden;
      animation: fadeUp 0.4s ease both;
      --card-color: var(--accent);
    }
    .tool-icon-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: var(--card-color);
      background: var(--surface3);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }
    .tool-big-icon {
      font-size: 2.4rem; margin-bottom: 1rem;
      height: 64px; display: flex; align-items: center;
      justify-content: center; color: var(--card-color);
    }
    .tool-icon-card h3 {
      font-family: 'Exo 2', sans-serif; font-size: 0.9rem;
      font-weight: 600; color: var(--text); line-height: 1.3;
    }
    .tool-icon-card .tool-arrow {
      position: absolute; bottom: 12px; right: 16px;
      font-size: 0.75rem; color: var(--text-muted); transition: all 0.2s;
    }
    .tool-icon-card:hover .tool-arrow { color: var(--card-color); transform: translateX(3px); }

    /* ── TOOL LOADER PAGE ── */
    .tool-container { animation: fadeIn 0.3s ease; }
    .tool-header {
      display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap;
      gap: 1rem; margin-bottom: 2rem;
      padding-bottom: 1.5rem; border-bottom: 1px solid var(--border);
    }
    .tool-title-row { display: flex; align-items: center; gap: 12px; }
    .tool-title-icon {
      width: 44px; height: 44px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--accent);
    }
    .tool-title-text {
      font-family: 'Rajdhani', sans-serif; font-size: 1.6rem;
      font-weight: 700; letter-spacing: 0.04em;
    }
    .tool-body {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 3rem 2rem; text-align: center;
    }
    .tool-body-icon {
      font-size: 3.5rem; margin-bottom: 1.2rem; color: var(--text-muted);
    }
    .tool-body-label {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      letter-spacing: 0.18em; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 2.5rem;
    }

    /* ── EXTERNAL LOADER ── */
    .ext-loader-bar {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface3); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 18px;
      flex-wrap: wrap; max-width: 800px; margin: 0 auto;
    }
    .ext-loader-label {
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.15em; color: var(--text-dim);
      text-transform: uppercase; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
    }
    .ext-loader-label i { color: var(--accent); }
    .ext-loader-input {
      flex: 1; min-width: 200px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 14px; color: var(--text);
      font-family: 'Space Mono', monospace; font-size: 0.75rem;
      outline: none; transition: border-color 0.2s;
    }
    .ext-loader-input:focus { border-color: var(--accent); }
    .ext-loader-input::placeholder { color: var(--text-muted); }
    .ext-loader-btn {
      background: var(--accent); color: #000; border: none;
      padding: 9px 20px; border-radius: 8px;
      font-family: 'Rajdhani', sans-serif; font-size: 0.95rem;
      font-weight: 700; letter-spacing: 0.06em; cursor: pointer;
      white-space: nowrap; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .ext-loader-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .ext-loader-file-btn {
      background: var(--surface2); color: var(--text-dim);
      border: 1px solid var(--border); padding: 9px 16px;
      border-radius: 8px; font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .ext-loader-file-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .ext-loader-error {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--security); letter-spacing: 0.08em;
      padding: 6px 10px; background: rgba(255,68,102,0.08);
      border: 1px solid rgba(255,68,102,0.2); border-radius: 6px;
      display: none; width: 100%; margin-top: 4px;
    }

    /* ── IFRAME MODAL ── */
    .ext-tool-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95); z-index: 1000;
      display: flex; align-items: stretch; justify-content: stretch;
      animation: fadeIn 0.2s ease;
    }
    .ext-tool-frame-wrap {
      position: relative; flex: 1; display: flex; flex-direction: column;
    }
    .ext-tool-topbar {
      display: flex; align-items: center;
      justify-content: space-between; padding: 10px 18px;
      background: var(--surface2); border-bottom: 1px solid var(--border);
      gap: 12px; flex-wrap: wrap;
    }
    .ext-tool-name {
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .ext-close-btn {
      background: var(--surface3); border: 1px solid var(--border);
      color: var(--text-dim); padding: 6px 16px; border-radius: 6px;
      font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .ext-close-btn:hover { border-color: var(--security); color: var(--security); }
    .ext-tool-iframe { flex: 1; border: none; width: 100%; background: #fff; }

    /* ── LOGIN MODAL ── */
    .login-modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; animation: fadeIn 0.2s ease;
    }
    .login-modal {
      position: relative;
      background: var(--surface2); border: 1px solid var(--login-color);
      border-radius: 22px; padding: 2.6rem 2.2rem 2.2rem;
      max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 30px 80px rgba(0,0,0,0.6), 0 0 50px color-mix(in srgb, var(--login-color) 25%, transparent);
      animation: fadeUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .login-modal.shake { animation: shakeX 0.4s ease; }
    @keyframes shakeX {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .login-close-btn {
      position: absolute; top: 14px; right: 14px;
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--surface3); border: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .login-close-btn:hover { border-color: var(--security); color: var(--security); }
    .login-modal-icon {
      width: 64px; height: 64px; margin: 0 auto 1.2rem;
      background: var(--surface3); border: 1px solid var(--login-color);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; color: var(--login-color);
    }
    .login-modal-title {
      font-family: 'Rajdhani', sans-serif; font-size: 1.5rem;
      font-weight: 700; letter-spacing: 0.03em; color: var(--text);
      margin-bottom: 0.3rem;
    }
    .login-modal-sub {
      font-size: 0.8rem; color: var(--text-dim); margin-bottom: 1.8rem;
    }
    .login-field { text-align: left; margin-bottom: 1.1rem; }
    .login-field label {
      display: flex; align-items: center; gap: 7px;
      font-family: 'Space Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.12em; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 6px;
    }
    .login-field label i { color: var(--login-color); }
    .login-field input {
      width: 100%; background: var(--surface3); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px; color: var(--text);
      font-family: 'Exo 2', sans-serif; font-size: 0.9rem;
      outline: none; transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--login-color); }
    .login-field input::placeholder { color: var(--text-muted); }
    .login-error {
      display: none; font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--security); background: rgba(255,68,102,0.08);
      border: 1px solid rgba(255,68,102,0.25); border-radius: 8px;
      padding: 8px 12px; margin-bottom: 1rem; text-align: left;
    }
    .login-submit-btn {
      width: 100%; background: var(--login-color); color: #000;
      border: none; padding: 12px; border-radius: 10px;
      font-family: 'Rajdhani', sans-serif; font-size: 1rem;
      font-weight: 700; letter-spacing: 0.05em; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s; margin-top: 0.3rem;
    }
    .login-submit-btn:hover { filter: brightness(1.12); transform: translateY(-1px); }

    /* ── MEP HOME BUTTON ── */
    .mep-home-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,120,40,0.08);
      border: 1px solid rgba(255,120,40,0.45);
      color: var(--accent); font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.12em;
      padding: 7px 18px; border-radius: 6px;
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
    }
    .mep-home-btn:hover { background: rgba(255,120,40,0.15); border-color: var(--accent2); color: var(--accent2); }

    /* ── FOOTER ── */
    .footer {
      text-align: center; padding: 3rem 0 2rem;
      font-family: 'Space Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase;
    }
    .footer span { color: var(--accent); animation: blink 2s ease infinite; }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px; margin-bottom: 2rem;
      font-family: 'Space Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.1em; color: var(--text-muted);
    }
    .breadcrumb .sep { color: var(--accent); }
    .breadcrumb .current { color: var(--text-dim); }
    .breadcrumb .bread-link { cursor: pointer; transition: color 0.2s; }
    .breadcrumb .bread-link:hover { color: var(--accent2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .category-grid { grid-template-columns: 1fr; }
      .tool-icons-grid { grid-template-columns: 1fr 1fr; }
      .home-title { font-size: 2.2rem; }
    }
    @media (max-width: 480px) {
      .tool-icons-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="appRoot"></div>
<script>

  {

function openExternalToolModal(src, label, isBlob) {
  const modal = document.createElement('div');
  modal.className = 'ext-tool-modal';
  let blobUrl = '';
  const iframeSrc = isBlob ? (blobUrl = URL.createObjectURL(new Blob([src], {type:'text/html'}))) : src;
  const shortLabel = label.length > 60 ? '…' + label.slice(-57) : label;
  modal.innerHTML = `
    <div class="ext-tool-frame-wrap">
      <div class="ext-tool-topbar">
        <span class="ext-tool-name"><i class="fas fa-file-code"></i> EXTERNAL TOOL &nbsp;—&nbsp; ${shortLabel}</span>
        <button class="ext-close-btn" id="extCloseBtn"><i class="fas fa-times"></i> CLOSE</button>
      </div>
      <iframe class="ext-tool-iframe" src="${iframeSrc}" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups"></iframe>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('extCloseBtn').onclick = () => {
    document.body.removeChild(modal);
    if (blobUrl) URL.revokeObjectURL(blobUrl);
  };
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { document.body.removeChild(modal); if (blobUrl) URL.revokeObjectURL(blobUrl); document.removeEventListener('keydown', esc); }
  });
}

function wireExtLoader() {
  const filePickBtn = document.getElementById('extFilePickBtn');
  const filePicker  = document.getElementById('extFilePicker');
  const pathInput   = document.getElementById('extPathInput');
  const loadBtn     = document.getElementById('extLoadBtn');
  const errorEl     = document.getElementById('extLoaderError');
  filePickBtn.onclick = () => filePicker.click();
  filePicker.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { pathInput.value = file.name; openExternalToolModal(ev.target.result, file.name, true); };
    reader.readAsText(file); filePicker.value = '';
  };
  loadBtn.onclick = () => {
    const val = pathInput.value.trim(); errorEl.style.display = 'none';
    if (!val) { errorEl.textContent = '⚠ Enter a file path or URL first.'; errorEl.style.display = 'block'; return; }
    openExternalToolModal(val, val, false);
  };
  pathInput.onkeydown = (e) => { if (e.key === 'Enter') loadBtn.click(); };
}

function openLoginModal(disc, onSuccess) {
  const overlay = document.createElement('div');
  overlay.className = 'login-modal-overlay';
  overlay.innerHTML = `
    <div class="login-modal" style="--login-color:${disc.color}">
      <button class="login-close-btn" id="loginCloseBtn"><i class="fas fa-times"></i></button>
      <div class="login-modal-icon">${disc.iconHtml}</div>
      <div class="login-modal-title">${disc.title}</div>
      <div class="login-modal-sub">Sign in to access this discipline</div>
      <div class="login-field">
        <label><i class="fas fa-envelope"></i> Enter Your Mail</label>
        <input type="email" id="loginEmail" placeholder="name@company.com" autocomplete="off">
      </div>
      <div class="login-field">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="off">
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="login-submit-btn" id="loginSubmitBtn"><i class="fas fa-arrow-right-to-bracket"></i> SIGN IN</button>
    </div>`;
  document.body.appendChild(overlay);

  const emailEl = document.getElementById('loginEmail');
  const passEl  = document.getElementById('loginPassword');
  const errEl   = document.getElementById('loginError');

  const closeModal = () => { if (document.body.contains(overlay)) document.body.removeChild(overlay); };

  const attemptLogin = () => {
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!email || !pass) {
      errEl.textContent = '⚠ Please enter both email and password.';
      errEl.style.display = 'block';
      return;
    }
    if (email.toLowerCase() === disc.auth.email.toLowerCase() && pass === disc.auth.password) {
      closeModal();
      onSuccess();
    } else {
      errEl.textContent = '⚠ Incorrect email or password.';
      errEl.style.display = 'block';
      const modal = overlay.querySelector('.login-modal');
      modal.classList.remove('shake'); void modal.offsetWidth; modal.classList.add('shake');
    }
  };

  document.getElementById('loginSubmitBtn').onclick = attemptLogin;
  document.getElementById('loginCloseBtn').onclick = closeModal;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  [emailEl, passEl].forEach(el => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); }));
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', esc); }
  });
  setTimeout(() => emailEl.focus(), 50);
}

      <h1 class="home-title" style="font-size:2.4rem">ICT DESIGN TOOLS</h1>
      <p class="home-sub">Networks &nbsp;·&nbsp; Security &nbsp;·&nbsp; PA/AV Specialized Toolkits</p>
      <div style="display:flex;justify-content:center;margin-bottom:1.2rem">
        <button class="mep-home-btn" id="btnMepHome"><i class="fas fa-house"></i> MEP DESIGN PLATFORM</button>
      </div>
      <div class="home-divider"><span>SELECT PACKAGE</span></div>
    </div>
    <div class="category-grid">
      ${ictCategories.map(cat => `
        <div class="category-card" data-cat="${cat.id}" style="--cat-color:${cat.color}">
          <div class="cat-corner-glow"></div>
          <div class="cat-tag">${cat.tag}</div>
          <div class="main-icon-wrap">${cat.icon}</div>
          <div class="cat-title">${cat.title}</div>
          <div class="cat-desc">${cat.desc}</div>
          <div class="sub-icons">${cat.subIcons.map(ic => `<div class="sub-icon"><i class="fas ${ic}"></i></div>`).join('')}</div>
        </div>`).join('')}
    </div>
    <div class="footer"><span>■</span> ICT DESIGN TOOLS &nbsp;·&nbsp; SELECT A PACKAGE TO BEGIN</div>`;
  document.getElementById('bcrHome').onclick = renderHome;
  document.getElementById('btnMepHome').onclick = renderHome;
  document.querySelectorAll('[data-cat]').forEach(card => {
    card.onclick = () => renderICTPackage(card.getAttribute('data-cat'));
  });
}

function renderICTPackage(catId) {
  const cat = ictCategories.find(c => c.id === catId);
  app.innerHTML = `
    <div class="package-wrap">
      <div class="breadcrumb">
        <span class="bread-link" id="bcrHome">MEP PLATFORM</span><span class="sep">›</span>
        <span class="bread-link" id="bcrICT">ICT DESIGN TOOLS</span><span class="sep">›</span>
        <span class="current">${cat.title}</span>
      </div>
      <div class="pkg-header">
        <div class="pkg-title-row">
          <div class="pkg-icon-box ${cat.iconClass}" style="color:${cat.color}; border-color:${cat.color}55; background:${cat.color}12">${cat.icon}</div>
          <div>
            <div class="pkg-name">${cat.title}</div>
            <div class="pkg-count">${cat.tools.length} TOOLS AVAILABLE</div>
          </div>
        </div>
        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> ICT Design Tools</button>
      </div>
      <div class="tool-icons-grid">
        ${cat.tools.map((t, i) => `
          <div class="tool-icon-card" data-tool="${t.toolId}" style="animation-delay:${i*0.08}s; --card-color:${cat.color}">
            <div class="tool-big-icon"><i class="${t.icon}"></i></div>
            <h3>${t.name}</h3>
            <span class="tool-arrow"><i class="fas fa-arrow-right"></i></span>
          </div>`).join('')}
        <div class="tool-icon-card" data-tool="__load__" style="animation-delay:${cat.tools.length*0.08}s; border-style:dashed; --card-color:${cat.color}">
          <div class="tool-big-icon"><i class="fas fa-folder-open"></i></div>
          <h3>Load External File</h3>
          <span class="tool-arrow"><i class="fas fa-arrow-right"></i></span>
        </div>
      </div>
      <div class="footer"><span>■</span> ${cat.title} &nbsp;·&nbsp; SELECT A TOOL TO BEGIN</div>
    </div>`;
  document.getElementById('bcrHome').onclick = renderHome;
  document.getElementById('bcrICT').onclick = renderICTHome;
  document.getElementById('backBtn').onclick = renderICTHome;
  document.querySelectorAll('[data-tool]').forEach(card => {
    card.onclick = () => {
      const toolId = card.getAttribute('data-tool');
      const tool = toolId === '__load__'
        ? { name:'Load External File', icon:'fas fa-folder-open' }
        : cat.tools.find(t => t.toolId === toolId);
      loaderPage({
        breadcrumbs: [
          { label:'MEP PLATFORM', fn: renderHome },
          { label:'ICT DESIGN TOOLS', fn: renderICTHome },
          { label: cat.title, fn: () => renderICTPackage(catId) },
          { label: toolId === '__load__' ? 'LOAD EXTERNAL FILE' : tool.name.toUpperCase() }
        ],
        toolName: tool.name,
        toolIcon: `<i class="${tool.icon}"></i>`,
        toolColor: cat.color,
        backFn: () => renderICTPackage(catId)
      });
    };
  });
}

renderHome();
</script>
