<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEP Design Platform</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    background:#000;overflow:hidden;
    font-family:'Exo 2',sans-serif;
  }

  /* ── PHASE VIEW CONTAINERS ── */
  .phase-view{
    position:fixed; inset:0; width:100%; height:100%;
    display:none; background:#000; z-index:1;
  }
  .phase-view.active{ display:block; }
  .phase-frame{
    width:100%; height:100%; border:none; display:block; background:#000;
  }

  /* ── SESSION BADGE (top right, sits above MEP iframe) ── */
  #sessionBadge{
    position:fixed; top:18px; right:18px; z-index:5000;
    display:none; align-items:center; gap:10px;
    background:rgba(10,10,14,0.85); backdrop-filter:blur(6px);
    border:1px solid rgba(255,120,40,0.4); border-radius:10px;
    padding:9px 16px; font-family:'Space Mono',monospace;
    box-shadow:0 8px 24px rgba(0,0,0,0.5), 0 0 20px rgba(255,120,40,0.08);
  }
  #sessionBadge .dot{
    width:8px; height:8px; border-radius:50%; background:#00e5a0;
    box-shadow:0 0 8px #00e5a0; animation:badgePulse 1.4s ease infinite;
  }
  #sessionBadge.warn .dot{ background:#ff4466; box-shadow:0 0 8px #ff4466; }
  @keyframes badgePulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  #sessionBadge .lbl{
    font-size:0.6rem; letter-spacing:0.15em; color:#8890aa; text-transform:uppercase;
  }
  #sessionBadge .val{
    font-size:0.95rem; font-weight:700; color:#ffaa55; letter-spacing:0.04em;
  }
  #sessionBadge.warn .val{ color:#ff4466; }

  /* ── LOGIN VIEW ── */
  #viewLogin{
    display:none;
    background:#000;
    position:fixed; inset:0; z-index:2;
    align-items:center; justify-content:center;
    overflow:auto;
  }
  #viewLogin.active{ display:flex; }
  #viewLogin::before{
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,120,40,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,120,40,0.05) 1px, transparent 1px);
    background-size:50px 50px; pointer-events:none;
  }
  #viewLogin::after{
    content:''; position:fixed; top:-200px; right:-200px;
    width:600px; height:600px;
    background:radial-gradient(circle, rgba(255,80,0,0.08) 0%, transparent 70%);
    pointer-events:none;
  }
  .login-card{
    position:relative; z-index:2;
    width:100%; max-width:400px; margin:24px;
    background:#0c0c10; border:1px solid rgba(255,120,40,0.35);
    border-radius:22px; padding:2.8rem 2.2rem 2.2rem;
    text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,0.7), 0 0 50px rgba(255,120,40,0.08);
    animation:loginUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes loginUp{ from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:translateY(0);} }
  .login-card.shake{ animation:shakeX 0.4s ease; }
  @keyframes shakeX{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);} 40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);} 80%{transform:translateX(5px);}
  }
  .login-logo{ width:72px; height:72px; margin:0 auto 1.2rem; }
  .login-logo svg{ width:72px; height:72px; }
  .login-card h1{
    font-family:'Rajdhani',sans-serif; font-size:1.7rem; font-weight:700;
    letter-spacing:0.06em; color:#eef0ff; text-transform:uppercase; margin-bottom:0.4rem;
  }
  .login-sub{
    font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:0.18em;
    color:#8890aa; text-transform:uppercase; margin-bottom:2rem;
  }
  .login-field{ text-align:left; margin-bottom:1.1rem; }
  .login-field label{
    display:flex; align-items:center; gap:7px;
    font-family:'Space Mono',monospace; font-size:0.62rem; letter-spacing:0.12em;
    color:#8890aa; text-transform:uppercase; margin-bottom:6px;
  }
  .login-field input{
    width:100%; background:#1a1a24; border:1px solid rgba(255,120,40,0.2);
    border-radius:10px; padding:12px 14px; color:#eef0ff;
    font-family:'Exo 2',sans-serif; font-size:0.92rem; outline:none;
    transition:border-color 0.2s;
  }
  .login-field input:focus{ border-color:#ff7828; }
  .login-error{
    display:none; font-family:'Space Mono',monospace; font-size:0.68rem;
    color:#ff4466; background:rgba(255,68,102,0.08);
    border:1px solid rgba(255,68,102,0.3); border-radius:8px;
    padding:9px 12px; margin-bottom:1rem; text-align:left; letter-spacing:0.04em;
  }
  .login-btn{
    width:100%; background:linear-gradient(135deg,#ff7828,#ff5500);
    color:#000; border:none; padding:13px; border-radius:10px;
    font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:700;
    letter-spacing:0.06em; cursor:pointer; text-transform:uppercase;
    transition:all 0.2s; margin-top:0.2rem;
  }
  .login-btn:hover{ filter:brightness(1.12); transform:translateY(-1px); }
  .login-hint{
    margin-top:1.4rem; font-family:'Space Mono',monospace; font-size:0.62rem;
    color:#44475a; letter-spacing:0.1em;
  }
  .login-footer{
    margin-top:1.6rem; font-family:'Space Mono',monospace; font-size:0.58rem;
    letter-spacing:0.2em; color:#44475a; text-transform:uppercase;
  }

  /* ── STATIC NOISE (FINAL) VIEW ── */
  #viewStatic{ background:#000; }
  #staticCanvas{ width:100%; height:100%; display:block; }
  .static-overlay{
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .static-msg{
    font-family:'Space Mono',monospace; color:#fff;
    text-align:center; text-shadow:0 0 12px rgba(0,0,0,0.8);
    animation:staticFlicker 0.12s infinite;
  }
  .static-msg .big{ font-size:2.2rem; letter-spacing:0.1em; font-weight:700; margin-bottom:0.6rem; }
  .static-msg .small{ font-size:0.8rem; letter-spacing:0.2em; opacity:0.75; }
  @keyframes staticFlicker{ 0%,100%{opacity:1;} 50%{opacity:0.85;} }
  .static-reset{
    position:fixed; bottom:14px; right:18px; z-index:20;
    pointer-events:auto; background:none; border:none;
    color:rgba(255,255,255,0.25); font-family:'Space Mono',monospace;
    font-size:0.6rem; letter-spacing:0.1em; cursor:pointer;
  }
  .static-reset:hover{ color:rgba(255,255,255,0.6); }
</style>
</head>
<body>

<div class="phase-view" id="viewMatrix">
  <iframe class="phase-frame" id="frameMatrix" title="Matrix Countdown"></iframe>
</div>

<div class="phase-view" id="viewLogin">
  <div class="login-card" id="loginCard">
    <div class="login-logo">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,4 58,18 58,46 32,60 6,46 6,18" fill="none" stroke="#ff7828" stroke-width="2"/>
        <polygon points="32,12 50,22 50,42 32,52 14,42 14,22" fill="rgba(255,120,40,0.05)" stroke="rgba(255,120,40,0.3)" stroke-width="1"/>
        <text x="32" y="33" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" font-weight="700" fill="#ff7828">MEP</text>
        <text x="32" y="42" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="6" font-weight="500" fill="rgba(255,120,40,0.7)">PLATFORM</text>
      </svg>
    </div>
    <h1>MEP Design Platform</h1>
    <p class="login-sub">Restricted Access &middot; Authentication Required</p>
    <form id="loginForm" autocomplete="off">
      <div class="login-field">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off">
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter password" autocomplete="off">
      </div>
      <div class="login-error" id="loginError">ACCESS DENIED &mdash; invalid username or password</div>
      <button type="submit" class="login-btn">Authenticate</button>
    </form>
    <div class="login-hint">Hint: admin / mep2024</div>
    <div class="login-footer">System Clearance Level 4 &middot; Session auto-expires after 10 min</div>
  </div>
</div>

<div class="phase-view" id="viewMep">
  <iframe class="phase-frame" id="frameMep" title="MEP Design Platform"></iframe>
</div>
<div id="sessionBadge">
  <span class="dot"></span>
  <span class="lbl">Session</span>
  <span class="val" id="sessionTimeText">10:00</span>
</div>

<div class="phase-view" id="viewMario">
  <iframe class="phase-frame" id="frameMario" title="404 Not Found"></iframe>
</div>

<div class="phase-view" id="viewStatic">
  <canvas id="staticCanvas"></canvas>
  <div class="static-overlay">
    <div class="static-msg">
      <div class="big">NO SIGNAL</div>
      <div class="small">ALL SESSIONS HAVE EXPIRED</div>
    </div>
  </div>
  <button class="static-reset" id="resetBtn">reset demo</button>
</div>

<template id="tplMatrix">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'VT323', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Matrix Rain Canvas */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* CRT Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 2;
        }

        /* CRT Flicker */
        .flicker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 70, 0.03);
            animation: flicker 0.15s infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Timer Container */
        .timer-container {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 50px 60px;
            background: rgba(0, 20, 0, 0.7);
            border: 2px solid #00ff41;
            border-radius: 4px;
            box-shadow:
                0 0 20px rgba(0, 255, 65, 0.3),
                inset 0 0 20px rgba(0, 255, 65, 0.1),
                0 0 60px rgba(0, 255, 65, 0.1);
            backdrop-filter: blur(2px);
        }

        .timer-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 4px;
            animation: borderPulse 2s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Glitch Text Effect for Title */
        .glitch-text {
            font-size: 1.4rem;
            color: #00ff41;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
            position: relative;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #ff0000;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-1 3s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #0000ff;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(20px, 9999px, 15px, 0); }
            20% { clip: rect(60px, 9999px, 70px, 0); }
            40% { clip: rect(20px, 9999px, 5px, 0); }
            60% { clip: rect(80px, 9999px, 50px, 0); }
            80% { clip: rect(10px, 9999px, 40px, 0); }
            100% { clip: rect(50px, 9999px, 20px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(10px, 9999px, 80px, 0); }
            20% { clip: rect(80px, 9999px, 10px, 0); }
            40% { clip: rect(30px, 9999px, 50px, 0); }
            60% { clip: rect(60px, 9999px, 90px, 0); }
            80% { clip: rect(20px, 9999px, 60px, 0); }
            100% { clip: rect(70px, 9999px, 30px, 0); }
        }

        /* Timer Display */
        .timer-display {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-box {
            width: 100px;
            height: 120px;
            background: rgba(0, 10, 0, 0.9);
            border: 1px solid #00ff41;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow:
                0 0 15px rgba(0, 255, 65, 0.2),
                inset 0 0 10px rgba(0, 255, 65, 0.05);
            position: relative;
            overflow: hidden;
        }

        .time-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-120px); }
            100% { transform: translateY(120px); }
        }

        .time-value {
            font-size: 3.5rem;
            font-weight: 400;
            color: #00ff41;
            text-shadow:
                0 0 10px rgba(0, 255, 65, 0.8),
                0 0 20px rgba(0, 255, 65, 0.4),
                0 0 40px rgba(0, 255, 65, 0.2);
            font-variant-numeric: tabular-nums;
            font-family: 'VT323', monospace;
            line-height: 1;
        }

        .time-label {
            margin-top: 10px;
            color: rgba(0, 255, 65, 0.6);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .separator {
            font-size: 2.5rem;
            color: #00ff41;
            font-weight: 400;
            margin-top: -15px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.6);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            margin-top: 30px;
            color: rgba(0, 255, 65, 0.5);
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .finished {
            animation: finishedPulse 0.5s infinite alternate;
        }

        @keyframes finishedPulse {
            from { color: #00ff41; text-shadow: 0 0 20px rgba(0, 255, 65, 0.8); }
            to { color: #ff0040; text-shadow: 0 0 30px rgba(255, 0, 64, 0.9); }
        }

        /* Binary decoration */
        .binary-deco {
            position: absolute;
            font-size: 0.7rem;
            color: rgba(0, 255, 65, 0.15);
            letter-spacing: 2px;
            pointer-events: none;
        }

        .binary-top { top: 10px; left: 15px; }
        .binary-bottom { bottom: 10px; right: 15px; }

        @media (max-width: 600px) {
            .timer-container {
                padding: 30px 20px;
            }
            .time-box {
                width: 70px;
                height: 90px;
            }
            .time-value {
                font-size: 2.5rem;
            }
            .timer-display {
                gap: 8px;
            }
            .separator {
                font-size: 1.8rem;
            }
            .glitch-text {
                font-size: 1rem;
                letter-spacing: 3px;
            }
        }
    </style>
    <canvas id="matrixCanvas"></canvas>
    <div class="scanlines"></div>
    <div class="flicker"></div>
    <div class="vignette"></div>

    <div class="timer-container">
        <div class="binary-deco binary-top">01001110 01000101 01001111</div>
        <div class="glitch-text" data-text="SYSTEM COUNTDOWN">SYSTEM COUNTDOWN</div>
        <div class="timer-display">
            <div class="time-unit">
                <div class="time-box">
                    <span class="time-value" id="hours">00</span>
                </div>
                <span class="time-label">Hours</span>
            </div>
            <div class="separator">:</div>
            <div class="time-unit">
                <div class="time-box">
                    <span class="time-value" id="minutes">01</span>
                </div>
                <span class="time-label">Minutes</span>
            </div>
            <div class="separator">:</div>
            <div class="time-unit">
                <div class="time-box">
                    <span class="time-value" id="seconds">00</span>
                </div>
                <span class="time-label">Seconds</span>
            </div>
        </div>
        <div class="status-text" id="status">TIME REMAINING...</div>
        <div class="binary-deco binary-bottom">01010100 01001000 01000101</div>
    </div>

    <script>
        // Matrix Rain Effect
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const matrixChars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz@#$%&*';
        const fontSize = 14;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Timer Logic with localStorage - 1 MINUTE
        const TOTAL_SECONDS = 60; // 1 minute

        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const statusEl = document.getElementById('status');

        let remainingSeconds;
        const savedEndTime = localStorage.getItem('mep_matrix_end');

        if (savedEndTime) {
            const endTime = parseInt(savedEndTime);
            remainingSeconds = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
        } else {
            remainingSeconds = TOTAL_SECONDS;
            const endTime = Date.now() + (TOTAL_SECONDS * 1000);
            localStorage.setItem('mep_matrix_end', endTime);
        }

        function updateDisplay() {
            const hrs = Math.floor(remainingSeconds / 3600);
            const mins = Math.floor((remainingSeconds % 3600) / 60);
            const secs = remainingSeconds % 60;

            hoursEl.textContent = String(hrs).padStart(2, '0');
            minutesEl.textContent = String(mins).padStart(2, '0');
            secondsEl.textContent = String(secs).padStart(2, '0');

            // Color shift when time is running low (last 10 seconds)
            if (remainingSeconds < 10) {
                const urgency = 1 - (remainingSeconds / 10);
                const r = Math.round(0 + urgency * 255);
                const g = Math.round(255 - urgency * 215);
                const b = Math.round(65 - urgency * 65);
                const color = `rgb(${r}, ${g}, ${b})`;
                document.querySelectorAll('.time-value').forEach(el => {
                    el.style.color = color;
                    el.style.textShadow = `0 0 10px ${color}, 0 0 20px ${color}`;
                });
            }
        }

        function countdown() {
            if (remainingSeconds > 0) {
                remainingSeconds--;
                updateDisplay();
            } else {
                clearInterval(timerInterval);
                statusEl.textContent = 'SYSTEM BREACH IMMINENT';
                statusEl.classList.add('finished');
                document.querySelectorAll('.time-value').forEach(el => {
                    el.classList.add('finished');
                });
                localStorage.removeItem('mep_matrix_end');
            }
        }

        updateDisplay();
        const timerInterval = setInterval(countdown, 1000);
    </script>
</template>

<template id="tplMario">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #5c94fc;
            font-family: 'Courier New', monospace;
        }

        .scene {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #5c94fc 0%, #5c94fc 70%, #000 70%, #000 100%);
        }

        .error-404 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            ['C5', 0.15], ['D5', 0.15], ['B4', 0.3],
            ['REST', 0.3]
        ];

        function playTone(freq, duration, type = 'square') {
            if (!audioCtx || freq === 0) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = type;
            osc.frequency.value = freq;

            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        function playMusic() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }

            if (musicPlaying) return;
            musicPlaying = true;
            musicStarted = true;

            const musicBtn = document.getElementById('musicBtn');
            musicBtn.textContent = '🔊';
            musicBtn.classList.remove('muted');

            const hint = document.getElementById('musicHint');
            if (hint) hint.style.display = 'none';

            let noteIndex = 0;

            function playNextNote() {
                if (!musicPlaying) return;

                if (noteIndex >= melody.length) {
                    noteIndex = 0;
                }

                const [note, duration] = melody[noteIndex];
                const freq = notes[note] || 0;

                playTone(freq, duration * 0.9);

                noteIndex++;

                musicInterval = setTimeout(playNextNote, duration * 1000);
            }

            playNextNote();
        }

        function stopMusic() {
            musicPlaying = false;
            clearTimeout(musicInterval);

            const musicBtn = document.getElementById('musicBtn');
            musicBtn.textContent = '🔇';
            musicBtn.classList.add('muted');
        }

        function toggleMusic() {
            if (musicPlaying) {
                stopMusic();
            } else {
                playMusic();
            }
        }

        // Try autoplay on load
        window.addEventListener('load', function() {
            try {
                audioCtx = new AudioContext();
                if (audioCtx.state === 'running') {
                    playMusic();
                }
            } catch(e) {}
        });

        // Start music on first click anywhere
        document.addEventListener('click', function startOnFirstClick(e) {
            if (e.target.closest('.music-btn')) return;
            if (!musicStarted) {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => playMusic());
                } else {
                    playMusic();
                }
            }
            document.removeEventListener('click', startOnFirstClick);
        });

        // ==================== ANIMATION ====================
        let coinTimers = [];
        let particleTimer = null;
        let autoReloadTimer = null;

        function clearAllTimers() {
            if (autoReloadTimer) clearTimeout(autoReloadTimer);
            coinTimers.forEach(t => clearTimeout(t));
            coinTimers = [];
            if (particleTimer) clearTimeout(particleTimer);
        }

        function startAnimation() {
            clearAllTimers();

            const coin = document.getElementById('coin');
            coin.style.display = 'none';
            coin.style.animation = 'none';

            ['q1', 'q2', 'q3'].forEach(id => {
                const block = document.getElementById(id);
                block.style.animation = 'none';
                block.style.transform = 'translateY(0)';
                block.offsetHeight;
                block.style.animation = 'qFloat 0.5s ease-in-out infinite alternate';
            });

            coinTimers.push(setTimeout(() => spawnCoin('q1'), 2200));
            coinTimers.push(setTimeout(() => spawnCoin('q2'), 3200));
            coinTimers.push(setTimeout(() => spawnCoin('q3'), 5200));

            particleTimer = setTimeout(() => {
                const goomba = document.getElementById('goomba');
                const goombaRect = goomba.getBoundingClientRect();
                createParticles(goombaRect.left + 20, goombaRect.top);
            }, 7500);

            autoReloadTimer = setTimeout(() => {
                restartAnimation();
            }, 15000);
        }

        function spawnCoin(blockId) {
            const block = document.getElementById(blockId);
            const coin = document.getElementById('coin');
            const rect = block.getBoundingClientRect();

            coin.style.display = 'block';
            coin.style.left = rect.left + 10 + 'px';
            coin.style.top = rect.top + 'px';
            coin.style.animation = 'none';

            requestAnimationFrame(() => {
                coin.style.animation = 'coinPop 1s ease-out forwards';
            });

            block.style.animation = 'none';
            block.style.transform = 'translateY(-10px)';
            setTimeout(() => {
                block.style.transform = 'translateY(0)';
                block.style.animation = 'qFloat 0.5s ease-in-out infinite alternate';
            }, 200);
        }

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
                particle.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px');
                document.querySelector('.scene').appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function restartAnimation() {
            clearAllTimers();

            const mario = document.getElementById('mario');
            const goomba = document.getElementById('goomba');

            // Remove animation classes to reset
            mario.classList.remove('running');
            goomba.classList.remove('walking');

            // Force reflow
            void mario.offsetWidth;
            void goomba.offsetWidth;

            // Re-add animation classes to restart
            mario.classList.add('running');
            goomba.classList.add('walking');

            // Clear old particles
            document.querySelectorAll('.particle').forEach(p => p.remove());

            // Reset coin display
            const coin = document.getElementById('coin');
            coin.style.display = 'none';
            coin.style.animation = 'none';

            startAnimation();
        }

        // Start animation immediately on page load
        startAnimation();
    </script>
</template>

function openExternalToolModal(src, label, isBlob) {
  const modal = document.createElement('div');
  modal.className = 'ext-tool-modal';
  let blobUrl = '';
  const iframeSrc = isBlob ? (blobUrl = URL.createObjectURL(new Blob([src], {type:'text/html'}))) : src;
  const shortLabel = label.length > 60 ? '…' + label.slice(-57) : label;
  modal.innerHTML = `
    <div class="ext-tool-frame-wrap">
      <div class="ext-tool-topbar">
        <span class="ext-tool-name"><i class="fas fa-file-code"></i> EXTERNAL TOOL &nbsp;—&nbsp; ${shortLabel}</span>
        <button class="ext-close-btn" id="extCloseBtn"><i class="fas fa-times"></i> CLOSE</button>
      </div>
      <iframe class="ext-tool-iframe" src="${iframeSrc}" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups"></iframe>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('extCloseBtn').onclick = () => {
    document.body.removeChild(modal);
    if (blobUrl) URL.revokeObjectURL(blobUrl);
  };
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { document.body.removeChild(modal); if (blobUrl) URL.revokeObjectURL(blobUrl); document.removeEventListener('keydown', esc); }
  });
}

function wireExtLoader() {
  const filePickBtn = document.getElementById('extFilePickBtn');
  const filePicker  = document.getElementById('extFilePicker');
  const pathInput   = document.getElementById('extPathInput');
  const loadBtn     = document.getElementById('extLoadBtn');
  const errorEl     = document.getElementById('extLoaderError');
  filePickBtn.onclick = () => filePicker.click();
  filePicker.onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { pathInput.value = file.name; openExternalToolModal(ev.target.result, file.name, true); };
    reader.readAsText(file); filePicker.value = '';
  };
  loadBtn.onclick = () => {
    const val = pathInput.value.trim(); errorEl.style.display = 'none';
    if (!val) { errorEl.textContent = '⚠ Enter a file path or URL first.'; errorEl.style.display = 'block'; return; }
    openExternalToolModal(val, val, false);
  };
  pathInput.onkeydown = (e) => { if (e.key === 'Enter') loadBtn.click(); };
}

function openLoginModal(disc, onSuccess) {
  const overlay = document.createElement('div');
  overlay.className = 'login-modal-overlay';
  overlay.innerHTML = `
    <div class="login-modal" style="--login-color:${disc.color}">
      <button class="login-close-btn" id="loginCloseBtn"><i class="fas fa-times"></i></button>
      <div class="login-modal-icon">${disc.iconHtml}</div>
      <div class="login-modal-title">${disc.title}</div>
      <div class="login-modal-sub">Sign in to access this discipline</div>
      <div class="login-field">
        <label><i class="fas fa-envelope"></i> Enter Your Mail</label>
        <input type="email" id="loginEmail" placeholder="name@company.com" autocomplete="off">
      </div>
      <div class="login-field">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="off">
      </div>
      <div class="login-error" id="loginError"></div>
      <button class="login-submit-btn" id="loginSubmitBtn"><i class="fas fa-arrow-right-to-bracket"></i> SIGN IN</button>
    </div>`;
  document.body.appendChild(overlay);

  const emailEl = document.getElementById('loginEmail');
  const passEl  = document.getElementById('loginPassword');
  const errEl   = document.getElementById('loginError');

  const closeModal = () => { if (document.body.contains(overlay)) document.body.removeChild(overlay); };

  const attemptLogin = () => {
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!email || !pass) {
      errEl.textContent = '⚠ Please enter both email and password.';
      errEl.style.display = 'block';
      return;
    }
    if (email.toLowerCase() === disc.auth.email.toLowerCase() && pass === disc.auth.password) {
      closeModal();
      onSuccess();
    } else {
      errEl.textContent = '⚠ Incorrect email or password.';
      errEl.style.display = 'block';
      const modal = overlay.querySelector('.login-modal');
      modal.classList.remove('shake'); void modal.offsetWidth; modal.classList.add('shake');
    }
  };

  document.getElementById('loginSubmitBtn').onclick = attemptLogin;
  document.getElementById('loginCloseBtn').onclick = closeModal;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  [emailEl, passEl].forEach(el => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); }));
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', esc); }
  });
  setTimeout(() => emailEl.focus(), 50);
}

<script>
(function(){
  'use strict';

  /* ── STORAGE KEYS ── */
  var K_PHASE   = 'mep_master_phase';
  var K_MATRIX  = 'mep_matrix_end';
  var K_SESSION = 'mep_session_end';
  var K_MARIO   = 'mep_mario_end';

  var DUR_MATRIX  = 30 * 1000;       // Phase 1: 1 minute
  var MATRIX_HOLD = 10 * 1000;        // extra time to stay on 00:00:00 before switching
  var DUR_SESSION = 5 * 60 * 1000;   // Phase 2: 5 minutes
  var DUR_MARIO   = 30 * 1000;       // Phase 3: 30 seconds

  /* ── DOM REFS ── */
  var views = {
    matrix:      document.getElementById('viewMatrix'),
    mep_login:   document.getElementById('viewLogin'),
    mep_session: document.getElementById('viewMep'),
    mario:       document.getElementById('viewMario'),
    static:      document.getElementById('viewStatic')
  };
  var sessionBadge   = document.getElementById('sessionBadge');
  var sessionTimeTxt = document.getElementById('sessionTimeText');
  var frameMatrix = document.getElementById('frameMatrix');
  var frameMep    = document.getElementById('frameMep');
  var frameMario  = document.getElementById('frameMario');
  var loginForm   = document.getElementById('loginForm');
  var loginCard   = document.getElementById('loginCard');
  var loginError  = document.getElementById('loginError');
  var resetBtn    = document.getElementById('resetBtn');

  var builtMatrix = false, builtMep = false, builtMario = false, builtStatic = false;
  var currentRendered = null;

  /* ── HELPERS ── */
  function now(){ return Date.now(); }
  function getNum(key){
    var v = localStorage.getItem(key);
    return v ? parseInt(v, 10) : 0;
  }
  function getPhase(){ return localStorage.getItem(K_PHASE); }
  function setPhase(p){ localStorage.setItem(K_PHASE, p); }

  function docFromTemplate(templateId, headExtra){
    var content = document.getElementById(templateId).innerHTML;
    return '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
      '<meta name="viewport" content="width=device-width, initial-scale=1.0">' +
      (headExtra || '') + '</head><body>' + content + '</body></html>';
  }

  function teardown(frameEl){
    frameEl.removeAttribute('srcdoc');
    frameEl.src = 'about:blank';
  }

  /* ── INITIALIZE STATE (first ever visit) ── */
  if (!getPhase()){
    setPhase('matrix');
    localStorage.setItem(K_MATRIX, String(now() + DUR_MATRIX));
  }

  /* ── RESOLVE CASCADING EXPIRIES (handles refresh / long absence) ── */
  function resolvePhase(){
    var phase = getPhase();
    var changed = true;
    while (changed){
      changed = false;
      var t = now();
      if (phase === 'matrix'){
        if (t >= getNum(K_MATRIX) + MATRIX_HOLD){
          phase = 'mep_login';
          setPhase(phase);
          changed = true;
        }
      } else if (phase === 'mep_session'){
        if (t >= getNum(K_SESSION)){
          phase = 'mario';
          localStorage.setItem(K_MARIO, String(t + DUR_MARIO));
          setPhase(phase);
          changed = true;
        }
      } else if (phase === 'mario'){
        if (t >= getNum(K_MARIO)){
          phase = 'static';
          setPhase(phase);
          changed = true;
        }
      }
      // 'mep_login' waits for user action; 'static' is terminal
    }
    return phase;
  }

  /* ── BUILDERS ── */
  function buildMatrixFrame(){
    if (builtMatrix) return;
    builtMatrix = true;
    frameMatrix.srcdoc = docFromTemplate('tplMatrix');
  }
  function buildMepFrame(){
    if (builtMep) return;
    builtMep = true;
    var headExtra = '<title>MEP Design Platform</title>';
    frameMep.srcdoc = docFromTemplate('tplMep', headExtra);
  }
  function buildMarioFrame(){
    if (builtMario) return;
    builtMario = true;
    frameMario.srcdoc = docFromTemplate('tplMario');
  }

  /* ── STATIC NOISE ANIMATION ── */
  var staticCtx = null, staticRAF = null;
  function buildStatic(){
    if (builtStatic) return;
    builtStatic = true;
    var canvas = document.getElementById('staticCanvas');
    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    staticCtx = canvas.getContext('2d');
    function draw(){
      var w = canvas.width, h = canvas.height;
      var imageData = staticCtx.createImageData(w, h);
      var buf = imageData.data;
      for (var i = 0; i < buf.length; i += 4){
        var shade = Math.random() * 255;
        buf[i] = shade; buf[i+1] = shade; buf[i+2] = shade; buf[i+3] = 255;
      }
      staticCtx.putImageData(imageData, 0, 0);
      staticRAF = requestAnimationFrame(draw);
    }
    draw();
  }

  /* ── RENDER / VIEW SWITCH ── */
  function showPhase(phase){
    if (phase === currentRendered) return;

    // Tear down whatever we are leaving
    if (currentRendered === 'matrix') teardown(frameMatrix);
    if (currentRendered === 'mep_session') { teardown(frameMep); sessionBadge.style.display = 'none'; sessionBadge.classList.remove('warn'); }
    if (currentRendered === 'mario') teardown(frameMario);

    for (var k in views){ views[k].classList.remove('active'); }

    if (phase === 'matrix'){
      buildMatrixFrame();
      views.matrix.classList.add('active');
    } else if (phase === 'mep_login'){
      views.mep_login.classList.add('active');
    } else if (phase === 'mep_session'){
      buildMepFrame();
      views.mep_session.classList.add('active');
      sessionBadge.style.display = 'flex';
    } else if (phase === 'mario'){
      buildMarioFrame();
      views.mario.classList.add('active');
    } else if (phase === 'static'){
      buildStatic();
      views.static.classList.add('active');
    }
    currentRendered = phase;
  }

  /* ── LOGIN HANDLER ── */
  loginForm.addEventListener('submit', function(e){
    e.preventDefault();
    var user = document.getElementById('loginUser').value.trim();
    var pass = document.getElementById('loginPass').value;
    if (user === 'admin' && pass === 'mep2024'){
      var endTime = now() + DUR_SESSION;
      localStorage.setItem(K_SESSION, String(endTime));
      setPhase('mep_session');
      showPhase('mep_session');
      updateSessionBadge();
    } else {
      loginError.style.display = 'block';
      loginCard.classList.remove('shake');
      void loginCard.offsetWidth;
      loginCard.classList.add('shake');
    }
  });

  /* ── RESET (visible only on static screen) ── */
  resetBtn.addEventListener('click', function(){
    localStorage.removeItem(K_PHASE);
    localStorage.removeItem(K_MATRIX);
    localStorage.removeItem(K_SESSION);
    localStorage.removeItem(K_MARIO);
    localStorage.removeItem('mep_matrix_end');
    location.reload();
  });

  /* ── SESSION BADGE TICK ── */
  function updateSessionBadge(){
    var remain = Math.max(0, getNum(K_SESSION) - now());
    var mins = Math.floor(remain / 60000);
    var secs = Math.floor((remain % 60000) / 1000);
    sessionTimeTxt.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    if (remain < 60000){ sessionBadge.classList.add('warn'); }
    else { sessionBadge.classList.remove('warn'); }
  }

  /* ── MAIN LOOP ── */
  function tick(){
    var phase = resolvePhase();
    showPhase(phase);
    if (phase === 'mep_session') updateSessionBadge();
  }

  tick();
  setInterval(tick, 1000);

})();
</script>
