<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MEP Design Platform</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000; --surface: #0c0c10; --surface2: #121218; --surface3: #1a1a24;
      --border: rgba(255,120,40,0.2); --border-hot: rgba(255,120,40,0.7);
      --accent: #ff7828; --accent2: #ffaa55; --accent3: #ff5500;
      --text: #eef0ff; --text-dim: #8890aa; --text-muted: #44475a;
      --ict: #38b6ff; --security: #ff4466; --pava: #a855f7;
      --electrical: #f59e0b; --mechanical: #10b981; --hvac: #0ea5e9; --firefighting: #ef4444;
      --success: #00e5a0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); font-family: 'Exo 2', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,120,40,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,120,40,0.04) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; top: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,80,0,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    #appRoot { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; min-height: 100vh; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .home-header { text-align: center; padding: 3rem 0 2rem; animation: fadeUp 0.6s ease both; }
    .home-logo { display: inline-flex; align-items: center; gap: 16px; margin-bottom: 1.5rem; }
    .logo-hexagon { width: 64px; height: 64px; position: relative; display: flex; align-items: center; justify-content: center; }
    .logo-hexagon svg { width: 64px; height: 64px; }
    .home-title { font-family: 'Rajdhani', sans-serif; font-size: 3.2rem; font-weight: 700; letter-spacing: 0.08em; background: linear-gradient(135deg, #ff7828 0%, #ffaa55 50%, #ff5500 100%); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; text-transform: uppercase; }
    .home-sub { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.25em; color: var(--text-dim); text-transform: uppercase; margin-top: 0.5rem; }
    .home-divider { display: flex; align-items: center; gap: 16px; margin: 2rem auto; max-width: 400px; }
    .home-divider::before, .home-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
    .home-divider span { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--accent); letter-spacing: 0.2em; }

    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin: 1rem 0 3rem; }
    .category-card {
      background: var(--surface2); border-radius: 20px; padding: 2.5rem 2rem; cursor: pointer;
      border: 1px solid var(--border); position: relative; overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, box-shadow 0.3s;
      animation: fadeUp 0.5s ease both;
    }
    .category-card:nth-child(1) { animation-delay: 0.1s; }
    .category-card:nth-child(2) { animation-delay: 0.2s; }
    .category-card:nth-child(3) { animation-delay: 0.3s; }
    .category-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent); transition: left 0.5s; }
    .category-card:hover::before { left: 100%; }
    .category-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--cat-color), transparent); opacity: 0; transition: opacity 0.3s; }
    .category-card:hover::after { opacity: 1; }
    .category-card:hover { transform: translateY(-6px) scale(1.01); border-color: var(--cat-color); box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(0,0,0,0.3); }
    .cat-corner-glow { position: absolute; bottom: -40px; right: -40px; width: 150px; height: 150px; background: radial-gradient(circle, var(--cat-color), transparent 70%); opacity: 0.08; transition: opacity 0.3s; }
    .category-card:hover .cat-corner-glow { opacity: 0.15; }

    /* CAT TAG - uses inline color from style attribute */
    .cat-tag { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--cat-color); text-transform: uppercase; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 8px; }
    .cat-tag::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--cat-color); }

    .main-icon-wrap { width: 80px; height: 80px; border-radius: 20px; background: var(--surface3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; position: relative; transition: border-color 0.3s; }
    .category-card:hover .main-icon-wrap { border-color: var(--cat-color); }
    .main-icon-wrap i { font-size: 2rem; color: var(--cat-color); }
    .main-icon-wrap svg { width: 40px; height: 40px; }
    .cat-title { font-family: 'Rajdhani', sans-serif; font-size: 1.7rem; font-weight: 700; letter-spacing: 0.04em; color: var(--text); margin-bottom: 0.3rem; }
    .cat-desc { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 1.5rem; }

    /* SUB ICONS - uses inline color from style attribute */
    .sub-icons { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .sub-icon { width: 36px; height: 36px; background: var(--surface3); border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--cat-color); font-size: 0.85rem; transition: all 0.2s; opacity: 0.6; }
    .category-card:hover .sub-icon { border-color: var(--cat-color); opacity: 1; background: rgba(0,0,0,0.3); }

    /* LOGIN MODAL */
    .login-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
    .login-modal { background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; position: relative; animation: fadeUp 0.4s ease; box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 40px rgba(255,120,40,0.1); }
    .login-modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--modal-color, var(--accent)), transparent); border-radius: 24px 24px 0 0; }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-icon { width: 72px; height: 72px; background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem; font-size: 2rem; color: var(--modal-color, var(--accent)); }
    .login-title { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 0.04em; color: var(--text); margin-bottom: 0.3rem; }
    .login-subtitle { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; }
    .login-input-group { margin-bottom: 1.2rem; }
    .login-input-group label { display: block; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .login-input { width: 100%; padding: 14px 18px; background: var(--surface3); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .login-input:focus { border-color: var(--modal-color, var(--accent)); box-shadow: 0 0 0 3px rgba(255,120,40,0.1); }
    .login-input::placeholder { color: var(--text-muted); }
    .login-btn { width: 100%; background: var(--modal-color, var(--accent)); color: #000; border: none; padding: 14px 28px; border-radius: 12px; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; margin-top: 0.5rem; transition: all 0.2s; text-transform: uppercase; }
    .login-btn:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,120,40,0.3); }
    .login-btn:active { transform: translateY(0); }
    .login-error { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--security); text-align: center; margin-top: 1rem; padding: 8px 12px; background: rgba(255,68,102,0.08); border: 1px solid rgba(255,68,102,0.2); border-radius: 8px; display: none; }
    .login-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; background: var(--surface3); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); cursor: pointer; font-size: 1rem; transition: all 0.2s; }
    .login-close:hover { border-color: var(--security); color: var(--security); }

    .package-wrap { animation: fadeIn 0.3s ease; }
    .pkg-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .pkg-title-row { display: flex; align-items: center; gap: 1rem; }
    .pkg-icon-box { width: 52px; height: 52px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .pkg-icon-box.ict { color: var(--ict); border-color: rgba(56,182,255,0.3); }
    .pkg-icon-box.sec { color: var(--security); border-color: rgba(255,68,102,0.3); }
    .pkg-icon-box.pava { color: var(--pava); border-color: rgba(168,85,247,0.3); }
    .pkg-icon-box.elec { color: var(--electrical); border-color: rgba(245,158,11,0.3); }
    .pkg-icon-box.hvac { color: var(--hvac); border-color: rgba(14,165,233,0.3); }
    .pkg-icon-box.fire { color: var(--firefighting); border-color: rgba(239,68,68,0.3); }
    .pkg-name { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: 0.04em; }
    .pkg-count { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.1em; }
    .back-btn { background: var(--surface2); border: 1px solid var(--border); padding: 10px 20px; border-radius: 50px; font-family: 'Exo 2', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-dim); transition: all 0.2s; }
    .back-btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent2); }
    .tool-icons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
    .tool-icon-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1); position: relative; overflow: hidden; animation: fadeUp 0.4s ease both; --card-color: var(--accent); }
    .tool-icon-card:hover { transform: translateY(-5px) scale(1.02); border-color: var(--card-color); background: var(--surface3); box-shadow: 0 15px 40px rgba(0,0,0,0.4), 0 0 20px rgba(0,0,0,0.15); }
    .tool-big-icon { font-size: 2.4rem; margin-bottom: 1rem; height: 64px; display: flex; align-items: center; justify-content: center; color: var(--card-color); }
    .tool-icon-card h3 { font-family: 'Exo 2', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .tool-icon-card .tool-arrow { position: absolute; bottom: 12px; right: 16px; font-size: 0.75rem; color: var(--text-muted); transition: all 0.2s; }
    .tool-icon-card:hover .tool-arrow { color: var(--card-color); transform: translateX(3px); }
    .tool-container { animation: fadeIn 0.3s ease; }
    .tool-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tool-title-row { display: flex; align-items: center; gap: 12px; }
    .tool-title-icon { width: 44px; height: 44px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--accent); }
    .tool-title-text { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 0.04em; }
    .tool-body { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; }
    .ext-loader-bar { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; margin-bottom: 2rem; animation: fadeUp 0.5s ease 0.4s both; flex-wrap: wrap; }
    .ext-loader-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .ext-loader-label i { color: var(--accent); }
    .ext-loader-input { flex: 1; min-width: 200px; background: var(--surface3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.75rem; outline: none; transition: border-color 0.2s; }
    .ext-loader-input:focus { border-color: var(--accent); }
    .ext-loader-input::placeholder { color: var(--text-muted); }
    .ext-loader-btn { background: var(--accent); color: #000; border: none; padding: 9px 20px; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .ext-loader-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .ext-loader-file-btn { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); padding: 9px 16px; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .ext-loader-file-btn:hover { border-color: var(--accent); color: var(--accent2); }
    .ext-tool-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; align-items: stretch; justify-content: stretch; animation: fadeIn 0.2s ease; }
    .ext-tool-frame-wrap { position: relative; flex: 1; display: flex; flex-direction: column; }
    .ext-tool-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
    .ext-tool-name { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .ext-tool-name i { opacity: 0.7; }
    .ext-close-btn { background: var(--surface3); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 16px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .ext-close-btn:hover { border-color: var(--security); color: var(--security); }
    .ext-tool-iframe { flex: 1; border: none; width: 100%; background: #000; }
    .ext-loader-error { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--security); letter-spacing: 0.08em; padding: 6px 10px; background: rgba(255,68,102,0.08); border: 1px solid rgba(255,68,102,0.2); border-radius: 6px; display: none; width: 100%; margin-top: 4px; }
    .footer { text-align: center; padding: 3rem 0 2rem; font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase; }
    .footer span { color: var(--accent); animation: blink 2s ease infinite; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-muted); }
    .breadcrumb .sep { color: var(--accent); }
    .breadcrumb .current { color: var(--text-dim); }
    .breadcrumb .bread-link { cursor: pointer; transition: color 0.2s; }
    .breadcrumb .bread-link:hover { color: var(--accent2); }
    .status-bar { display: flex; align-items: center; gap: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 16px; margin-bottom: 2rem; font-family: 'Space Mono', monospace; font-size: 0.65rem; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: blink 1.5s ease infinite; }
    .status-text { color: var(--text-dim); letter-spacing: 0.1em; }
    @media (max-width: 700px) { .category-grid { grid-template-columns: 1fr; } .tool-icons-grid { grid-template-columns: 1fr 1fr; } .home-title { font-size: 2.2rem; } .login-modal { margin: 1rem; padding: 2rem 1.5rem; } }
    @media (max-width: 480px) { .tool-icons-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<div id="appRoot"></div>
<script>

  modalOverlay.className = 'login-modal-overlay';
  modalOverlay.id = 'loginModalOverlay';
  modalOverlay.innerHTML = `
    <div class="login-modal" style="--modal-color: ${creds.color};">
      <div class="login-close" id="loginClose"><i class="fas fa-times"></i></div>
      <div class="login-header">

        <div class="login-title">${creds.title}</div>
        <div class="login-subtitle">SECURE ACCESS REQUIRED</div>
      </div>
      <div class="login-input-group">
        <label><i class="fas fa-envelope" style="margin-right:6px;"></i>Enter Your Mail</label>
        <input type="text" class="login-input" id="loginEmail" value="${creds.email}" placeholder="Enter your email">
      </div>
      <div class="login-input-group">
        <label><i class="fas fa-lock" style="margin-right:6px;"></i>Password</label>
        <input type="password" class="login-input" id="loginPassword" value="${creds.password}" placeholder="Enter your password">
      </div>
      <button class="login-btn" id="loginSubmitBtn" style="background: ${creds.color};">
        <i class="fas fa-right-to-bracket" style="margin-right:8px;"></i>ACCESS TOOLS
      </button>
      <div class="login-error" id="loginError"></div>
    </div>`;
  document.body.appendChild(modalOverlay);
  document.getElementById('loginClose').addEventListener('click', () => { document.body.removeChild(modalOverlay); });
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) { document.body.removeChild(modalOverlay); } });
  document.getElementById('loginSubmitBtn').addEventListener('click', () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');
    if (email === creds.email && password === creds.password) {
      document.body.removeChild(modalOverlay);
      renderDiscipline(discId);
    } else {
      errorEl.textContent = '⚠ Invalid email or password. Please try again.';
      errorEl.style.display = 'block';
    }
  });
  document.getElementById('loginPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('loginSubmitBtn').click(); });
}

// ─── EXTERNAL TOOL MODAL ────────────────────────────────────
function openExternalToolModal(src, label, isBlob) {
  const modal = document.createElement('div');
  modal.className = 'ext-tool-modal';
  let iframeSrc = ''; let blobUrl = '';
  if (isBlob) { const blob = new Blob([src], { type: 'text/html' }); blobUrl = URL.createObjectURL(blob); iframeSrc = blobUrl; }
  else { iframeSrc = src; }
  const shortLabel = label.length > 60 ? '...' + label.slice(-57) : label;
  modal.innerHTML = `<div class="ext-tool-frame-wrap"><div class="ext-tool-topbar"><span class="ext-tool-name"><i class="fas fa-file-code"></i> EXTERNAL TOOL — ${shortLabel}</span><div style="display:flex;gap:8px;align-items:center"><button class="ext-close-btn" id="extCloseBtn"><i class="fas fa-times"></i> CLOSE</button></div></div><iframe class="ext-tool-iframe" id="extToolIframe" src="${iframeSrc}" sandbox="allow-scripts allow-forms allow-same-origin allow-modals allow-popups"></iframe></div>`;
  document.body.appendChild(modal);
  document.getElementById('extCloseBtn').addEventListener('click', () => { document.body.removeChild(modal); if (blobUrl) URL.revokeObjectURL(blobUrl); });
  const escHandler = (e) => { if (e.key === 'Escape') { document.body.removeChild(modal); if (blobUrl) URL.revokeObjectURL(blobUrl); document.removeEventListener('keydown', escHandler); } };
  document.addEventListener('keydown', escHandler);
}

// ─── WIRE EXTERNAL LOADER ──────────────────────────────────
function wireExtLoader() {
  const filePickBtn = document.getElementById('extFilePickBtn');
  const filePicker = document.getElementById('extFilePicker');
  const pathInput = document.getElementById('extPathInput');
  const loadBtn = document.getElementById('extLoadBtn');
  const errorEl = document.getElementById('extLoaderError');
  filePickBtn.addEventListener('click', () => filePicker.click());
  filePicker.addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { pathInput.value = file.name; openExternalToolModal(ev.target.result, file.name, true); };
    reader.readAsText(file); filePicker.value = '';
  });
  loadBtn.addEventListener('click', () => {
    const val = pathInput.value.trim(); errorEl.style.display = 'none';
    if (!val) { errorEl.textContent = '⚠ Enter a file path or URL first.'; errorEl.style.display = 'block'; return; }
    openExternalToolModal(val, val, false);
  });
  pathInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadBtn.click(); });
}

        <span class="bread-link" id="bcrDiscG">${discLabel}</span><span class="sep">›</span>
        <span class="current">${tool.name.toUpperCase()}</span>
      </div>
      <div class="tool-header">
        <div class="tool-title-row">
          <div class="tool-title-icon" style="color:${color}; border-color:${color}40"><i class="${tool.icon}"></i></div>
          <span class="tool-title-text">${tool.name}</span>
        </div>
        <button class="back-btn" id="backToDiscG"><i class="fas fa-arrow-left"></i> Back</button>
      </div>
      <div class="tool-body">
        <div style="text-align:center; padding:3rem 1rem;">
          <div style="font-size:3rem; margin-bottom:1rem; color:var(--text-muted)"><i class="fas fa-folder-open"></i></div>
          <div style="font-family:'Space Mono',monospace; font-size:0.7rem; letter-spacing:0.15em; color:var(--text-dim); text-transform:uppercase; margin-bottom:2rem">
            Load your tool file to begin
          </div>
          <div class="ext-loader-bar" style="margin-bottom:0; max-width:700px; margin-left:auto; margin-right:auto;">
            <span class="ext-loader-label"><i class="fas fa-file-code"></i> TOOL FILE</span>
            <input class="ext-loader-input" id="extPathInput" type="text" placeholder="Enter path or URL — e.g. ./tools/${toolId}.html">
            <button class="ext-loader-file-btn" id="extFilePickBtn"><i class="fas fa-upload"></i> Browse</button>
            <input type="file" id="extFilePicker" accept=".html,.htm" style="display:none">
            <button class="ext-loader-btn" id="extLoadBtn"><i class="fas fa-play"></i> OPEN</button>
            <span class="ext-loader-error" id="extLoaderError"></span>
          </div>
        </div>
      </div>
      <div class="footer"><span>■</span> LOAD TOOL FILE TO BEGIN</div>
    </div>
  `;
  document.getElementById('backToDiscG').onclick = backFn;
  document.getElementById('bcrHomeG').onclick = renderHome;
  document.getElementById('bcrDiscG').onclick = backFn;
  document.querySelectorAll('.bread-link').forEach(el => el.style.cursor = 'pointer');
  wireExtLoader();
}

// ─── INIT ─────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
